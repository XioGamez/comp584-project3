<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <!-- row 1, 4 individual boxes -->
        <div class="row">
            <article class="col-1">Box 1</article>
            <article class="col-1">Box 2</article>
            <article class="col-1">Box 3</article>
            <article class="col-1">Box 4</article>
        </div>

        <!-- row 2, 2 boxes spanning 2 rows -->
        <div class="row">
            <article class="col-2">Box 1</article>
            <article class="col-2">Box 2</article>
        </div>

        <!-- row 3: narrow left column, wide right/content column -->
        <div class="row">
            <article class="col-3">Narrow column</article>
            <article class="col-3">Wide column</article>
        </div>

        <!-- row 4: one column -->
        <div class="row">
            <article class="col-4">Full width</article>
        </div>

        <!-- row 5, 1-2-1 individual boxes -->
        <div class="row">
            <article class="col-5">Left column</article>
            <article class="col-5">Middle wider column</article>
            <article class="col-5">Right column</article>
        </div>

        <!-- row 6 -->
        <div class="row">
            <article class="col-6">Full width</article>
        </div>
    </div>
</body>
</html>
