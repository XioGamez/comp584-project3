<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Strike</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner">
        <img src="https://cdn-game-photos.zeusx.com/6e1653f5-ad59-42df-a0d6-b9a46aed0c77.png"
             alt="Blood Strike" class="banner-img">
    </div>
    <div class="wrapper">
        <!-- row 1, 4 individual boxes -->
        <div class="row">
            <article class="col-1">
                <img src="https://i.pinimg.com/474x/4e/94/d0/4e94d0c27c0c989e2767452e3a36f37f.jpg" alt="Ethan">
                <h2>Ethan</h2>
            </article>
            <article class="col-1">
                <img src="https://i.pinimg.com/736x/7c/07/8d/7c078d4ac5318581fc83c8121117c35a.jpg" alt="Zero">
                <h2>Zero</h2>
            </article>
            <article class="col-1">
                <img src="https://i.pinimg.com/736x/72/eb/10/72eb1011040cfe7208726a6f3501e5ca.jpg" alt="E.M.T.">
                <h2>E.M.T.</h2>
            </article>
            <article class="col-1">
                <img src="https://i.pinimg.com/736x/10/d3/c8/10d3c8bace509b02969160b3a0b5804c.jpg" alt="Nova">
                <h2>Nova</h2>
            </article>
        </div>

        <!-- row 2, 2 boxes spanning 2 rows -->
        <div class="row">
            <article class="col-2">
                <img src="https://www.blood-strike.com/m/gw/20230721092756/data/18/role.png" alt="Katya">
                <h2>Katya</h2>
            </article>
            <article class="col-2">
                <img src="https://i.pinimg.com/736x/48/fb/3b/48fb3baf0ccef17a6f11972a3dd5a3cb.jpg" alt="Jack">
                <h2>Jack</h2>
            </article>
        </div>

        <!-- row 3: narrow left column, wide right/content column -->
        <div class="row">
            <article class="col-3">
                <img src="https://i.pinimg.com/736x/65/5c/13/655c13c9ed8de4c24818808878120877.jpg" alt="Hank">
                <h2>Hank</h2>
            </article>
            <article class="col-3">
                <img src="https://i.pinimg.com/736x/99/02/78/990278f3c1336a69a2c70734b005dc5b.jpg" alt="Ran">
                <h2>Ran</h2>
            </article>
        </div>

        <!-- row 4: one column -->
        <div class="row">
            <article class="col-4">
                <img src="https://i.pinimg.com/736x/ce/bf/79/cebf799a2f7c0578d6beaa9c92270001.jpg" alt="Emma">
                <h2>Emma</h2>
            </article>
        </div>

        <!-- row 5, 1-2-1 individual boxes -->
        <div class="row">
            <article class="col-5">
                <img src="https://i.pinimg.com/736x/05/47/49/054749c70de89d23efce6cbbfc3a23a4.jpg" alt="Kainda">
                <h2>Kainda</h2>
            </article>
            <article class="col-5">
                <img src="https://i.pinimg.com/736x/27/ff/64/27ff6479c8504aba10fa767930b97417.jpg" alt="Jet">
                <h2>Jet</h2>
            </article>
            <article class="col-5">
                <img src="https://i.pinimg.com/736x/cc/ab/b7/ccabb75d37fcc3b8d2a635fd624095b8.jpg" alt="Blast">
                <h2>Blast</h2>
            </article>
        </div>

        <!-- row 6 -->
        <div class="row">
            <article class="col-6">
                Val
                <img src="https://i.pinimg.com/736x/8d/12/9c/8d129c57c556c608db18ae4bb9d20fbb.jpg" alt="Val">
                <h2>Val</h2>
                <img src="https://i.pinimg.com/736x/90/2c/a4/902ca448decace3d00fe9774cb28dc58.jpg" alt="Kraken">
                <h2>Kraken</h2>
                <img src="https://i.pinimg.com/736x/de/53/c6/de53c6d7bf07ca14db01beaaaf7cb28c.jpg" alt="Spike">
                <h2>Spike</h2>
                <img src="https://i.pinimg.com/736x/4d/06/a4/4d06a4b92f97f74b65448c9e2143aa7c.jpg" alt="Nacho">
                <h2>Nacho</h2>
                <img src="https://i.pinimg.com/736x/ed/cf/3b/edcf3b277775fbe060da23bf2bafd2df.jpg" alt="Volt">
                <h2>Volt</h2>
                <br>
                <h2>Lucian</h2>
                <h2>Alondra - new -</h2>
            </article>
        </div>
    </div>
</body>
</html>
